<h2>Old Fashioned — The Timeless Classic</h2>
<p>The Old Fashioned is considered one of the oldest known cocktails, dating back to the early 1800s in the United States. It was created as a reaction against increasingly complicated drinks — a return to something <em>old fashioned</em>.</p>
<h3>Recipe</h3>
<ul>
<li>60 ml bourbon or rye whiskey</li>
<li>1 sugar cube</li>
<li>2–3 dashes Angostura bitters</li>
<li>Ice and orange peel to garnish</li>
</ul>
<p>Muddle the sugar with the bitters and a splash of water in the glass. Add whiskey and ice, stir and garnish with orange peel.</p>
<div class="tip">The Old Fashioned is one of the few cocktails to survive Prohibition in the United States — a testament to its simplicity and enduring appeal.</div>
<h2>Martini — Elegant Simplicity</h2>
<p>The Martini's history is debated, but it is thought to have developed in the late 1800s as a variant of a drink called the Martinez. It quickly became a symbol of sophistication and remains one of the world's most iconic cocktails.</p>
<h3>Recipe</h3>
<ul>
<li>60 ml gin or vodka</li>
