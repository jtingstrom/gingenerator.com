      body: `<p>Walk into any serious cocktail bar and you will notice something immediately — the ice is different. Large, perfectly clear cubes sit in the glasses like glass sculptures, catching the light. This is not just aesthetics. <strong>Clear ice genuinely makes cocktails taste better.</strong></p>
<h2>Why is ice usually cloudy?</h2>
<p>Tap water contains dissolved air and minerals. When water freezes quickly — as it does in a standard freezer — it freezes from the outside in, trapping those gases and impurities in the centre. The result is the cloudy, white core you see in a typical ice cube. That trapped air also weakens the structure of the ice, making it melt faster and dilute your drink more quickly.</p>
<h2>Why clear ice is better</h2>
<p>Clear ice is denser and harder than cloudy ice. It melts significantly more slowly, which means your drink stays cold longer without being watered down. A perfectly made Old Fashioned over a single large clear cube will still be at its best 20 minutes after pouring. The same drink over standard ice will be noticeably diluted in half that time.</p>
<p>There is also a textural difference. Clear ice has no air bubbles to crunch or crack unexpectedly. It is smooth, heavy and substantial in the glass.</p>
<h2>Directional freezing — the key principle</h2>
<p>Professional clear ice is made using <strong>directional freezing</strong> — the water freezes from one direction only, pushing the impurities and air ahead of the freezing front until they concentrate at the end, which is then discarded.</p>
<p>At an industrial level this is done with machines that circulate water constantly. At home, you can achieve the same effect with a simple cooler.</p>
<h2>The cooler method</h2>
<p>This is the easiest and most reliable way to make clear ice at home.</p>
<ul>
<li>Take a small insulated cooler — a lunch box size works perfectly</li>
<li>Fill it almost to the top with water (tap water is fine; boiling it first helps remove some dissolved gas)</li>
<li>Place the cooler in your freezer <strong>without the lid</strong></li>
<li>Freeze for 24–30 hours — the water will freeze from the top down, pushing impurities to the bottom</li>
<li>Remove and let it sit at room temperature for 10 minutes</li>
<li>Tip out — the bottom portion will be cloudy; cut or break it off and discard it</li>
<li>The top section is your clear ice — cut it into whatever shape you need</li>
</ul>
<h2>Cutting and shaping</h2>
<p>A serrated bread knife works surprisingly well for cutting ice. Score a line where you want to cut, then tap firmly with the spine of the knife. A large chef's knife and a mallet give more control for precise cuts. For spheres, you can use a purpose-made ice sphere press — a beautiful piece of kit that melts a rough chunk into a perfect ball using body heat and pressure.</p>
<h2>What size and shape?</h2>
<p><strong>Large cubes (5–6 cm)</strong> are ideal for spirit-forward drinks like Old Fashioned, Negroni and Manhattan — one cube per glass. <strong>Long spears</strong> fit perfectly in a highball for Gin and Tonic or Moscow Mule. <strong>Spheres</strong> are the ultimate showpiece — they have the lowest surface area to volume ratio of any shape, making them the slowest-melting option of all.</p>
<p>Once you start using clear ice, the cloudy cubes from a standard tray will feel like a compromise. It is one of those small upgrades that genuinely transforms the drinking experience at home.</p>`

      body: `<p>Kliv in på vilken seriös cocktailbar som helst och du märker något direkt — isen är annorlunda. Stora, kristallklara kuber sitter i glasen som glasskulpturer och fångar ljuset. Det är inte bara estetik. <strong>Klar is gör faktiskt cocktails godare.</strong></p>
<h2>Varför är is vanligtvis grumlig?</h2>
<p>Kranvatten innehåller löst luft och mineraler. När vatten fryser snabbt — som det gör i en vanlig frys — fryser det utifrån och in och fångar dessa gaser och föroreningar i mitten. Resultatet är den grumliga, vita kärnan du ser i en typisk isbit. Den innespelade luften försämrar också isens struktur, vilket gör att den smälter snabbare och spär ut din drink fortare.</p>
<h2>Varför klar is är bättre</h2>
<p>Klar is är tätare och hårdare än grumlig is. Den smälter betydligt långsammare, vilket innebär att din drink håller sig kall längre utan att bli utspädd. En perfekt gjord Old Fashioned på en enda stor klar kub är fortfarande på toppen 20 minuter efter att ha hällts upp. Samma drink på vanlig is är märkbart utspädd på halva den tiden.</p>
<p>Det finns också en texturskillnad. Klar is har inga luftbubblor som knapar eller spricker oväntat. Den är slät, tung och substantiell i glaset.</p>
<h2>Riktad frysning — principen</h2>
<p>Professionell klar is tillverkas med <strong>riktad frysning</strong> — vattnet fryser från en riktning, och skjuter föroreningar och luft framför frysningsfronten tills de koncentreras i änden, som sedan kastas bort.</p>
<p>På industriell nivå görs detta med maskiner som cirkulerar vatten konstant. Hemma kan du uppnå samma effekt med en enkel kylväska.</p>
<h2>Kylväskemetoden</h2>
<ul>
<li>Ta en liten isolerad kylväska — lunchlåda-storlek fungerar perfekt</li>
<li>Fyll den nästan till toppen med vatten (kranvatten funkar; att koka det först hjälper till att ta bort löst gas)</li>
<li>Placera kylväskan i frysen <strong>utan locket</strong></li>
<li>Frys i 24–30 timmar — vattnet fryser uppifrån och ner och skjuter föroreningar till botten</li>
<li>Ta ut och låt det stå i rumstemperatur i 10 minuter</li>
<li>Häll ut — den nedre delen är grumlig; skär eller bryt bort den och kasta</li>
<li>Den övre delen är din klara is — skär den i vilken form du behöver</li>
</ul>
<h2>Skärning och formgivning</h2>
<p>En brödkniv med taggigt blad fungerar förvånansvärt bra för att skära is. Gör ett märke där du vill skära, tryck sedan bestämt med ryggen av kniven. En stor kockkniv och en klubba ger mer kontroll för precisa snitt. För sfärer kan du använda en issfärpress.</p>
<h2>Vilken storlek och form?</h2>
<p><strong>Stora kuber (5–6 cm)</strong> är idealiska för spritbaserade drinkar som Old Fashioned, Negroni och Manhattan. <strong>Långa spjut</strong> passar perfekt i ett highball-glas för Gin och Tonic. <strong>Sfärer</strong> är det ultimata showcaset — de har den lägsta ytarean i förhållande till volym av alla former och smälter allra långsammast.</p>`

      body: `<p>Intră în orice bar serios de cocktailuri și vei observa ceva imediat — gheața este diferită. Cuburi mari, perfect limpezi stau în pahare ca sculpturi de sticlă, captând lumina. Nu este doar estetică. <strong>Gheața limpede face cocktailurile cu adevărat mai bune.</strong></p>
<h2>De ce este gheața de obicei tulbure?</h2>
<p>Apa de la robinet conține aer dizolvat și minerale. Când apa îngheață rapid — cum se întâmplă într-un congelator standard — îngheață dinspre exterior spre interior, captând acele gaze și impurități în centru. Rezultatul este miezul tulbure, alb pe care îl vezi într-un cub de gheață obișnuit. Aerul capturat slăbește și structura gheții, făcând-o să se topească mai repede.</p>
<h2>De ce gheața limpede este mai bună</h2>
<p>Gheața limpede este mai densă și mai dură decât gheața tulbure. Se topește semnificativ mai lent, ceea ce înseamnă că băutura ta rămâne rece mai mult timp fără a fi diluată. Un Old Fashioned perfect preparat peste un singur cub mare de gheață limpede va fi încă la cel mai bun nivel la 20 de minute după turnare.</p>
<h2>Înghețarea direcțională — principiul cheie</h2>
<p>Gheața limpede profesională este realizată prin <strong>înghețare direcțională</strong> — apa îngheață dintr-o singură direcție, împingând impuritățile și aerul înainte până se concentrează la capăt, care este apoi eliminat.</p>
<h2>Metoda cu răcitor</h2>
<ul>
<li>Ia un răcitor mic izolat — dimensiunea unei cutii de prânz funcționează perfect</li>
<li>Umple-l aproape până la vârf cu apă</li>
<li>Pune răcitorul în congelator <strong>fără capac</strong></li>
<li>Congeleaza 24–30 ore — apa va îngheța de sus în jos, împingând impuritățile la fund</li>
<li>Scoate și lasă la temperatura camerei 10 minute</li>
<li>Răstoarnă — partea de jos va fi tulbure; taie-o și arunc-o</li>
<li>Partea de sus este gheața ta limpede</li>
</ul>
