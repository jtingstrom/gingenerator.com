<h2>Raspberry Schnaps</h2>
<h3>Ingredients</h3>
<ul>
<li>500 g fresh raspberries</li>
<li>500 ml vodka or neutral spirit</li>
<li>200 g caster sugar</li>
<li>A coffee filter or muslin cloth</li>
</ul>
<h3>Method</h3>
<ol>
<li>Wash the raspberries and place them in a clean glass jar.</li>
<li>Pour the vodka over the raspberries so they are fully submerged. Seal the jar and store in a dark, cool place for 2–3 weeks, shaking gently each day.</li>
<li>Strain through a coffee filter or muslin to remove the raspberry solids. Add the sugar and stir until fully dissolved.</li>
<li>Return to the jar and leave for a further 1–2 weeks to mature.</li>
</ol>
<div class="tip">Add a strip of lemon peel or a vanilla pod during infusion for an extra layer of flavour.</div>
<h2>Vanilla Vodka</h2>
<h3>Ingredients</h3>
<ul>
<li>1 litre vodka</li>
<li>2–3 vanilla pods</li>
<li>A glass jar with a lid</li>
</ul>
<h3>Method</h3>
<ol>
<li>Split the vanilla pods lengthwise to expose the seeds.</li>
<li>Place the pods in the jar and pour over the vodka. Seal and store in a dark, cool place for at least 2 weeks — the longer, the more intense the flavour.</li>
<li>Strain through a filter to remove the vanilla residue.</li>
<li>Use in cocktails such as a <strong>Vanilla Martini</strong> or enjoy neat over ice.</li>
</ol>
<div class="tip">For a faster infusion, gently warm the vodka (do not boil) before adding the vanilla pods.</div>
<h2>Chilli-Infused Tequila</h2>
<h3>Ingredients</h3>

<li>750 ml tequila (preferably 100% agave)</li>
<li>2–3 fresh chillies (jalapeño for moderate heat, habanero for serious heat)</li>
<li>A glass jar with a lid</li>
</ul>
<h3>Method</h3>
<ol>
<li>Slice the chillies thinly. Remove the seeds for a milder result.</li>
<li>Place the slices in the jar and pour over the tequila. Seal and store in a cool, dark place for 3–5 days. Taste after day 3 to check the heat level.</li>
<li>When you are happy with the flavour, strain through a filter to remove the chilli residue.</li>
<li>Use in a <strong>Spicy Margarita</strong> or drink neat if you are feeling brave.</li>

<div class="tip">Add a slice of lime or orange during infusion for an extra dimension of flavour.</div>`, footerAbout: 'About', footerContact: 'Contact' },
    sv: { label: 'Artikel', title: `Gör egna likörer och infusioner`, body: `<p>Att skapa egna likörer och infusioner hemma är både roligt och belönande. Det ger dig möjlighet att experimentera med smaker och skapa unika drycker. Här guidar vi dig genom tre recept: <strong>hallonsnaps, vaniljvodka och chili-infunderad tequila</strong>.</p>
<h2>Hallonsnaps</h2>
<h3>Ingredienser</h3>
<ul>
<li>500 g färska hallon</li>
<li>500 ml vodka eller neutral sprit</li>
<li>200 g strösocker</li>
<li>Kaffefilter eller ostduk</li>
</ul>
<h3>Tillagning</h3>
<ol>
<li>Tvätta hallonen och placera dem i en ren glasburk.</li>
<li>Häll vodkan över hallonen så att de täcks helt. Förslut burken och låt stå i 2–3 veckor på en mörk och sval plats. Skaka lätt varje dag.</li>
<li>Sila genom kaffefilter. Tillsätt sockret och rör om tills det lösts upp.</li>
<li>Häll tillbaka i burken och låt vila 1–2 veckor till.</li>
</ol>
<div class="tip">Lägg till ett citronskal eller en vaniljstång under infusionen för en extra smakdimension.</div>
<h2>Vaniljvodka</h2>
<h3>Ingredienser</h3>
<ul>
<li>1 liter vodka</li>
<li>2–3 vaniljstänger</li>
<li>Glasburk med lock</li>
</ul>
<h3>Tillagning</h3>
<ol>
<li>Skär vaniljstängerna på längden.</li>
<li>Placera i burken och häll över vodkan. Låt stå i minst 2 veckor — ju längre, desto starkare smak.</li>
<li>Sila bort vaniljresterna.</li>
<li>Perfekt i en <strong>Vanilla Martini</strong> eller ren med lite is.</li>
</ol>
<h2>Chili-infunderad tequila</h2>
<h3>Ingredienser</h3>
<ul>
<li>750 ml tequila (helst 100% agave)</li>
<li>2–3 färska chilipeppar</li>
<li>Glasburk med lock</li>
</ul>
<h3>Tillagning</h3>
<ol>
<li>Skär chilin i tunna skivor. Ta bort fröna för mildare smak.</li>
<li>Lägg i burken och häll över tequilan. Låt stå 3–5 dagar. Smaka av efter dag 3.</li>

<h2>Schnaps de zmeură</h2>
<ol>
<li>Spălați zmeurica și puneți-o într-un borcan de sticlă curat.</li>
<li>Turnați vodca peste zmeură. Sigilați și lăsați 2–3 săptămâni într-un loc răcoros și întunecat, agitând ușor în fiecare zi.</li>
<li>Strecurați printr-un filtru de cafea. Adăugați zahărul și amestecați până se dizolvă complet.</li>
<li>Lăsați să se matureze încă 1–2 săptămâni.</li>
</ol>
<h2>Vodcă de vanilie</h2>
<ol>
<li>Tăiați păstăile de vanilie pe lungime.</li>
<li>Puneți în borcan și turnați vodca. Lăsați cel puțin 2 săptămâni.</li>
<li>Strecurați și folosiți în cocktailuri.</li>
</ol>
<h2>Tequila infuzată cu chili</h2>
<ol>
<li>Tăiați ardeii chili în felii subțiri.</li>
<li>Puneți în borcan cu tequila. Lăsați 3–5 zile, gustând după ziua 3.</li>
<li>Strecurați și folosiți într-o <strong>Margarita picantă</strong>.</li>
