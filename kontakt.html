  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #2c2418; --surface: #161616; --surface2: #1f1f1f;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --text: #f0ece4; --muted: #888; --accent: #d4a84b; --accent2: #e8c97a;
      --radius: 10px; --radius-lg: 16px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }
    .lang-toggle {
      position: fixed; top: 1.2rem; right: 1.5rem; z-index: 999;
      display: flex; background: var(--surface); border: 1px solid var(--border2);
      border-radius: 999px; padding: 2px; gap: 2px;
    }
    .lang-toggle button {
      height: 28px; padding: 0 12px; background: none; border: none;
      border-radius: 999px; color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .lang-toggle button.active {
      background: var(--surface2); color: var(--accent); border: 1px solid var(--border2);
    }
    .logo a { text-decoration: none; display: flex; align-items: center; gap: 12px; }
    .logo svg { color: var(--accent); flex-shrink: 0; }
    h1 {
      font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 400; letter-spacing: -0.01em; color: var(--text); line-height: 1.1;
    }
    h1 em { font-style: italic; color: var(--accent); }
    main {
      width: 100%; max-width: 1100px;
      padding: 0 1.5rem 4rem; position: relative; z-index: 1;
    }
    .contact-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 2rem;
    }
    .section-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem;
    }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block; font-size: 13px; color: var(--muted);
      margin-bottom: 0.4rem; font-weight: 400;
    }
    .form-group input,
    .form-group textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 300;
      color: var(--text); outline: none; transition: border-color 0.15s; resize: vertical;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--muted); }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { min-height: 140px; }
    .hp { display: none; }
    .btn-submit {
      width: 100%; height: 52px; background: var(--surface);
      border: 1px solid var(--border2); border-radius: var(--radius);
      color: var(--text); font-family: 'Playfair Display', serif;
      font-size: 17px; font-weight: 400; font-style: italic;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-submit:hover { border-color: var(--accent); background: rgba(212,168,75,0.05); }
    .success-msg {
      display: none; text-align: center; padding: 2rem;
      color: var(--accent); font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-style: italic;
    }
    footer {
      width: 100%; max-width: 1100px; padding: 0 1.5rem 2rem;
      text-align: center; font-size: 12px; color: rgba(255,255,255,0.2);
      position: relative; z-index: 1;
    }
    footer a { color: rgba(212,168,75,0.4); text-decoration: none; }
    footer a:hover { color: var(--accent); }
    @media (max-width: 500px) {
    }

    header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo-wrap { display: flex; align-items: center; gap: 12px; padding-bottom: 1rem; }
    .logo-wrap a { text-decoration: none; display: flex; align-items: center; gap: 12px; }
    .logo-wrap svg { color: var(--accent); flex-shrink: 0; }
    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 3vw, 1.9rem);
      font-weight: 400; color: var(--text); line-height: 1.1;
    }
    .logo-title em { font-style: italic; color: var(--accent); }
    .header-sub {
      font-size: 13px; color: var(--muted);
      font-weight: 300; padding-bottom: 1.1rem;
      text-align: right;
    }
    @media (max-width: 600px) {
      .header-sub { display: none; }
      .header-inner { padding-bottom: 0.75rem; }
    }
    nav.site-nav {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative; z-index: 9;
    }
    .site-nav-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 1.5rem;
      display: flex; align-items: center; gap: 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .site-nav-inner::-webkit-scrollbar { display: none; }
    .nav-link {
      display: block; padding: 0.65rem 1.1rem; font-size: 13px; font-weight: 400;
      color: var(--muted); text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
    @media (max-width: 500px) { .nav-link { padding: 0.65rem 0.75rem; font-size: 12px; } }
  </style>

<body>

<div class="lang-toggle">
  <button id="btn-sv" onclick="setLang('sv')">SV</button>
  <button id="btn-en" onclick="setLang('en')">EN</button>
  <button id="btn-ro" onclick="setLang('ro')">RO</button>
</div>



<main>
  <div class="contact-card">
    <div class="section-label" id="label-contact">Kontakta oss</div>

    <form id="contact-form" action="https://formspree.io/f/mkokjdlw" method="POST">
      <div class="hp">
        <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="name" id="label-name">Namn</label>
        <input type="text" id="name" name="name" placeholder="Ditt namn" required />
      </div>
      <div class="form-group">
        <label for="email" id="label-email">E-post</label>
        <input type="email" id="email" name="email" placeholder="din@epost.se" required />
      </div>
      <div class="form-group">
        <label for="message" id="label-message">Meddelande</label>
        <textarea id="message" name="message" placeholder="Skriv ditt meddelande här…" required></textarea>
      </div>
      <button type="submit" class="btn-submit"><span>✦</span> <span id="btn-send">Skicka meddelande</span></button>
    </form>

    <div class="success-msg" id="success-msg">
      <span id="success-text">Tack för ditt meddelande! Vi återkommer så snart vi kan.</span>
    </div>
  </div>
</main>

<footer>
  Recipes from <a href="https://www.thecocktaildb.com" target="_blank">TheCocktailDB</a> · Av Jan Tingström · <span style="color:var(--muted);font-size:11px;">v1.24</span>
</footer>

<script>
  const i18n = {
    sv: {
      tagline: 'Vi hör gärna från dig.',
      backLink: '← Tillbaka till generatorn',
      labelContact: 'Kontakta oss',
      labelName: 'Namn', placeholderName: 'Ditt namn',
      labelEmail: 'E-post', placeholderEmail: 'din@epost.se',
      labelMessage: 'Meddelande', placeholderMessage: 'Skriv ditt meddelande här…',
      btnSend: 'Skicka meddelande',
      success: 'Tack för ditt meddelande! Vi återkommer så snart vi kan.',
      footerContact: 'Kontakt',
    },
    en: {
      tagline: "We'd love to hear from you.",
      backLink: '← Back to the generator',
      labelContact: 'Contact us',
      labelName: 'Name', placeholderName: 'Your name',
      labelEmail: 'Email', placeholderEmail: 'your@email.com',
      labelMessage: 'Message', placeholderMessage: 'Write your message here…',
      btnSend: 'Send message',
      success: "Thank you for your message! We'll get back to you as soon as possible.",
      footerContact: 'Contact',
    },
    ro: {
      tagline: 'Ne bucurăm să auzim de la tine.',
      backLink: '← Înapoi la generator',
      labelContact: 'Contactează-ne',
      labelName: 'Nume', placeholderName: 'Numele tău',
      labelEmail: 'E-mail', placeholderEmail: 'email@tau.ro',
      labelMessage: 'Mesaj', placeholderMessage: 'Scrie mesajul tău aici…',
      btnSend: 'Trimite mesajul',
      success: 'Mulțumim pentru mesaj! Îți vom răspunde cât mai curând.',
      footerContact: 'Contact',
    }
  };


  // Nav labels i18n
  const navLabels = {
    sv: { home: 'Generator', articles: 'Artiklar', clarification: 'Klaring', clearice: 'Klar is', siphon: 'Sifon', distillation: 'Destillering', about: 'Om', kontakt: 'Kontakt' },
    en: { home: 'Generator', articles: 'Articles', clarification: 'Clarification', clearice: 'Clear Ice', siphon: 'Siphon', distillation: 'Distillation', about: 'About', kontakt: 'Contact' },
    ro: { home: 'Generator', articles: 'Articole', clarification: 'Clarificare', clearice: 'Gheată limpede', siphon: 'Sifon', distillation: 'Distilare', about: 'Despre', kontakt: 'Contact' },
  };
  function applyNavLang() {
    const labels = navLabels[lang] || navLabels.en;
    Object.entries(labels).forEach(([key, label]) => {
      const el = document.getElementById('nav-' + key);
      if (el) el.textContent = label;
    });
  }

  // Page subtitle
  const pageSub = { sv: 'Kontakta oss', en: 'Get in touch', ro: 'Contactează-ne' };
  function applySubtitle() {
    const el = document.getElementById('header-sub');
    if (el) el.textContent = pageSub[lang] || pageSub.en;
  }
  let lang = localStorage.getItem('revben_lang') || 'sv';

  function t(key) { return (i18n[lang] && i18n[lang][key]) || i18n.sv[key] || key; }

  function applyLang() {
    const set = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
    const setph = (id, val) => { const e = document.getElementById(id); if (e) e.placeholder = val; };
    document.querySelector('html').lang = lang;
    set('tagline', t('tagline'));
    set('back-link', t('backLink'));
    set('label-contact', t('labelContact'));
    set('label-name', t('labelName')); setph('name', t('placeholderName'));
    set('label-email', t('labelEmail')); setph('email', t('placeholderEmail'));
    set('label-message', t('labelMessage')); setph('message', t('placeholderMessage'));
    set('btn-send', t('btnSend'));
    set('success-text', t('success'));
    set('footer-contact', t('footerContact'));
  }

  function setLang(l) {
    lang = l;
    localStorage.setItem('revben_lang', l);
    ['sv','en','ro'].forEach(code => {
      const b = document.getElementById('btn-' + code);
      if (b) b.classList.toggle('active', code === l);
    });
    applyLang();
  }

  document.addEventListener('DOMContentLoaded', () => setLang(lang));

  const form = document.getElementById('contact-form');
  const success = document.getElementById('success-msg');
  form.addEventListener('submit', async e => {
    e.preventDefault();
    const data = new FormData(form);
    const res = await fetch(form.action, {
      method: 'POST', body: data, headers: { 'Accept': 'application/json' }
    });
    if (res.ok) {
      form.style.display = 'none';
      success.style.display = 'block';
    }
  });
</script>
